<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - HMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>🏥 HMS</h2>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="patients.html">Patients</a>
        <a href="doctors.html">Doctors</a>
        <a href="appointments.html">Appointments</a>
        <a href="records.html">Medical Records</a>
        <a href="billing.html" class="active">Billing</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Billing Management</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Generate invoices, process payments, and manage financial records for treatments.</p>
            </div>
            <button class="btn" onclick="openModal('billModal')">+ Generate Bill</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Bill ID</th>
                        <th>Patient Name</th>
                        <th>Consultation Fee</th>
                        <th>Medicine Charge</th>
                        <th>Lab Charge</th>
                        <th>Total Amount</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="billModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Generate Bill</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="billForm">
                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" name="patient_name" required>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex:1">
                        <label>Consultation Fee ($)</label>
                        <input type="number" step="0.01" name="consultation_fee" id="fee" required oninput="calcTotal()">
                    </div>
                    <div style="flex:1">
                        <label>Medicine Charge ($)</label>
                        <input type="number" step="0.01" name="medicine_charge" id="med" required oninput="calcTotal()">
                    </div>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex:1">
                        <label>Laboratory Charge ($)</label>
                        <input type="number" step="0.01" name="laboratory_charge" id="lab" required oninput="calcTotal()">
                    </div>
                    <div style="flex:1">
                        <label>Total Amount ($)</label>
                        <input type="number" step="0.01" name="total_amount" id="total" readonly>
                    </div>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex:1">
                        <label>Payment Method</label>
                        <select name="payment_method">
                            <option>Cash</option>
                            <option>UPI</option>
                            <option>Credit Card</option>
                            <option>Debit Card</option>
                            <option>Insurance</option>
                        </select>
                    </div>
                    <div style="flex:1">
                        <label>Status</label>
                        <select name="payment_status">
                            <option>Paid</option>
                            <option>Pending</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal('billModal')">Cancel</button>
                    <button type="submit" class="btn btn-success">Generate</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function calcTotal() {
            const fee = parseFloat(document.getElementById('fee').value) || 0;
            const med = parseFloat(document.getElementById('med').value) || 0;
            const lab = parseFloat(document.getElementById('lab').value) || 0;
            document.getElementById('total').value = (fee + med + lab).toFixed(2);
        }

        async function loadData() {
            const data = await fetchData('/bills/');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            data.forEach(item => {
                const statusColor = item.payment_status === 'Paid' ? '#10b981' : '#ef4444';
                tbody.innerHTML += `
                    <tr>
                        <td>${item.bill_id}</td>
                        <td>${item.patient_name}</td>
                        <td>$${item.consultation_fee}</td>
                        <td>$${item.medicine_charge}</td>
                        <td>$${item.laboratory_charge}</td>
                        <td>$${item.total_amount}</td>
                        <td>${item.payment_method}</td>
                        <td><span style="color:white;background:${statusColor};padding:4px 8px;border-radius:4px;font-size:0.8rem">${item.payment_status}</span></td>
                        <td class="actions">
                            <button class="btn btn-small btn-danger" onclick="deleteData(${item.bill_id})">Delete</button>
                            <button class="btn btn-small btn-success" onclick="printBill(${item.bill_id})">Print</button>
                        </td>
                    </tr>
                `;
            });
        }

        function printBill(id) {
            window.print();
        }

        document.getElementById('billForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            await postData('/bills/add/', data);
            closeModal('billModal');
            e.target.reset();
            loadData();
        });

        async function deleteData(id) {
            if(confirm('Are you sure?')) {
                await postData(`/bills/delete/${id}/`, {}, 'DELETE');
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
